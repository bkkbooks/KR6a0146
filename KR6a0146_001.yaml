body:
  text: 失譯人名今附西晉録聞如是一時佛在舍衛國祇樹給孤獨園為諸四輩弟子説經是時國中給孤獨家為子娶婦得長者女名曰玉耶端正殊特不以婦禮輕慢公姑及以夫壻給孤獨長者夫婦議言是婦不順當云何教若加杖捶非善法也設不教訶其罪日增長者議曰惟佛能化明旦嚴服往詣佛所稽首禮足前白佛言我為子娶婦得長者女甚大憍慢不以婦禮惟願世尊哀愍我等并諸弟子明日勸請到舍説經令心開解佛即受請長者歡喜禮佛而歸長者到舍廣設調度嚴飾床座明旦佛來到長者舍長者欣慶請如來入舍衆坐已定皆各禮佛却住一面佛飯食訖并為説經惟有玉耶憍慢不出佛念愍之放大神力變長者家皆化作水精色內外相照無有障礙玉耶見佛三十二相八十種好衣毛為竪戰栗惶怖即出禮佛却住一面合掌低頭默無所説佛語玉耶女人不以面貌端正不順夫壻非為端正心端行正是為端正女人身中有十惡事不自覺知何等十惡一者託生父母甚難養育二者懷妊憂愁三者初生父母不喜四者養育無味五者父母隨逐不離時宜六者處處畏人七者常憂嫁之八者生已父母離別九者常畏夫壻十者不得自在是名十惡也玉耶惶怖白佛言世尊願佛教我婦人之禮其事云何佛語玉耶婦事夫壻公姑大長有五善三惡何等五善一者後臥早起美食先進二者撾罵不得懷恚三者一心向夫不得邪淫四者願夫長壽以身奉使五者夫壻遠行整理家中無有二心是為五善何等三惡一者輕慢夫壻不順大長美食自噉未冥早臥日出不起夫壻教訶瞋目怒應二者見夫不歡心常敗壞念他男子好三者願夫早死更嫁是為三惡玉耶默然無言可答佛語玉耶世間下有七輩婦為汝説之一心善聽一者母婦二者妹婦三者知識婦四者婦婦五者婢婦六者怨家婦七者奪命婦汝今解不玉耶答言不及此義佛言善聽吾今解之何等母婦愛念夫主如母愛子晝夜長養不失時宜心常憐念無有厭患念夫如子是為母婦何等妹婦承事夫壻盡其敬誠如兄如弟同氣分形骨血至親無有二情尊之重之如妹事兄是為妹婦何等知識婦奉事夫壻敬順懇至依依戀戀不能相遠私密之事常相告示行無違失善事相教使益明慧相親相愛欲令度世如善知識是為知識婦何等婦婦供養大人竭情盡行無有一二淨修婦禮終不廢闕進不犯義退不失禮常和為貴是名婦婦何等婢婦心常畏忌不敢自慢忠孝盡節口不麁言身不放逸以禮自防如民奉王夫壻敬幸不得憍慢若得杖捶敬承奉受及見罵辱默然無辭甘身苦樂無有二心募修婦道不擇衣食事夫如事大家是名婢婦何等怨家婦見夫不歡恆懷瞋恚晝夜求願欲得遠離雖為夫婦心常如寄亂頭勤臥無有畏避不作生活養育兒子身行淫蕩不知羞恥陷入罪法毀辱親里夫壻相憎呪欲令死是名怨家婦何等奪命婦晝夜不眠毒心伺之作何方便得遠離之欲與毒藥恐人覺之心外情通雇人害之復遣傍夫伺而賊之夫死更嫁適我願之是名奪命婦佛語玉耶其有善婦者當有顯名宗親九族并蒙其榮天龍鬼神擁護其形使不枉橫財寶日生萬分之後願願不違上生天上宮殿浴池在所自然天人樂之天上壽盡還生世間常為富貴侯王子孫端正姝好人所奉尊其惡婦者當得惡名今現在身不得安寧數為鬼神在於家庭起病發禍求及神明會當歸死不得長生惡夢恐怖所願不成多逢災橫水火日驚萬分之後魂神受形死入地獄餓鬼畜生其身矬短咽如針釘身臥鐵床數千萬劫受罪畢訖還生惡家貧窮裸露無絲無麻孜孜急急共相鞭撾從生至死無有榮華作善得善作惡自遮善惡如此非是虛也佛語玉耶此是七輩婦汝用何行玉耶流淚前白佛言我本愚癡不順夫尊自今已後當如婢婦盡我命壽不敢憍慢即前長跪求受十戒三自歸命歸佛歸法歸比丘僧一不殺生二不偷盜三不淫佚四不妄語五不飲酒六不惡口七不綺語八不嫉妬九不瞋恚十者信善得善是名十戒此優婆夷所行佛説經竟及諸弟子皆各欲還給孤獨長者眷屬歡喜禮佛而退玉耶長跪重白佛言我本愚癡憍慢夫壻今蒙世尊化導我等令心開解佛語玉耶自今已後擁護汝家玉耶言諾受佛言教不敢有違稽首禮足受退還歸
